services:
  app:
    image: e-catholic-catechism-school:prod
    build:
      context: .
      target: prod
      args:
        # Public, non-secret — inlined into the client bundle at build time.
        # Edit these to point at your own Convex deployment.
        VITE_CONVEX_URL: ${VITE_CONVEX_URL}
        VITE_CONVEX_SITE_URL: ${VITE_CONVEX_SITE_URL}
        VITE_DEFAULT_TIMEZONE: ${VITE_DEFAULT_TIMEZONE}
        VITE_DEFAULT_LOCALE: ${VITE_DEFAULT_LOCALE}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        SENTRY_PROJECT: ${SENTRY_PROJECT}
        SENTRY_ORG: ${SENTRY_ORG}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
    ports:
      - "3000:3000"
    env_file:
      - .env
    # environment:
    #   # Self-hosted convex
    #   CONVEX_SELF_HOSTED_URL: ${CONVEX_SELF_HOSTED_URL}
    #   CONVEX_SELF_HOSTED_ADMIN_KEY: ${CONVEX_SELF_HOSTED_ADMIN_KEY}
    #   CONVEX_URL_INTERNAL: http://convex-backend:3210
    # depends_on:
    #   convex-backend:
    #     condition: service_healthy
    #   convex-deploy:
    #     condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Self-hosted Convex (opt-in alternative to Convex Cloud).
  # Reverting to Cloud-only? Also remove the app service's `depends_on`
  # entries and `environment` above — they reference convex-backend
  # and convex-deploy.
  # In your .env make sure to update following env vars
  # - disable CONVEX_DEPLOYMENT
  # - set VITE_CONVEX_URL to http://localhost:3210
  # - set VITE_CONVEX_SITE_URL to http://localhost:3211
  # - set CONVEX_SELF_HOSTED_URL to http://localhost:3210
  # - set CONVEX_SELF_HOSTED_ADMIN_KEY to your admin key
  # After first `docker compose up`, generate an admin key for the CLI/dashboard:
  #   docker compose exec convex-backend ./generate_admin_key.sh
  # Full guide: https://github.com/get-convex/convex-backend/blob/main/self-hosted/README.md
  # ---------------------------------------------------------------------

